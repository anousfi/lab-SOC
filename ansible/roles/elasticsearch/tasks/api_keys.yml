- name: Verify elastic secret from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: elastic
  delegate_to: localhost
  register: elastic_secret
  ignore_errors: true
  no_log: true 

- name: Generate elastic password
  ansible.builtin.set_fact:
    elastic_password: "{{ lookup('ansible.builtin.password', '/dev/null length=24 chars=ascii_letters,digits') }}"
  when: elastic_secret is failed
  run_once: true
  no_log: true

- name: Store elastic password
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: elastic
    data:
      elastic_password: "{{ elastic_password }}"
  delegate_to: localhost
  run_once: true
  register: elastic_store_result
  when: elastic_secret is failed
  no_log: true

- name: Assert elastic password was stored
  ansible.builtin.assert:
    that: not elastic_store_result.failed
    fail_msg: "Échec écriture Vault — secret non persisté"
  when:
    - elastic_secret is failed
    - elastic_store_result is defined

- name: Propagate elastic password to all hosts
  ansible.builtin.set_fact:
    elastic_password: "{{ hostvars[ansible_play_hosts[0]].elastic_password }}"
  when: 
    - elastic_secret is failed
    - elastic_password is not defined
  no_log: true

- name: Set elastic password fact (from Vault)
  ansible.builtin.set_fact:
    elastic_password: "{{ elastic_secret.data.data.elastic_password }}"
  when: elastic_secret is not failed
  no_log: true

- name: Get Filebeat API key from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: filebeat_api_key
  delegate_to: localhost
  register: filebeat_secret
  ignore_errors: true
  no_log: true

- name: Create Filebeat API key
  ansible.builtin.uri:
    url: "https://{{ elasticsearch_host }}:9200/_security/api_key"
    method: POST
    user: elastic
    password: "{{ elastic_password }}"
    body_format: json
    body:
      name: filebeat-key
      role_descriptors:
        filebeat_role:
          cluster:
            - monitor
            - manage_ilm
          index:
            - names: 
                - "filebeat-*"
              privileges:
                - write
                - create_index
                - create_doc
                - manage
    validate_certs: true
    ca_path: /etc/elasticsearch/certs/ca.crt
  register: filebeat_api_key_result
  when: filebeat_secret is failed
  run_one: true
  no_log: true

- name: Store Filebeat API key in Vault
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: filebeat_api_key
    data:
      api_key: "{{ filebeat_api_key_result.json.id }}:{{ filebeat_api_key_result.json.api_key }}"
  delegate_to: localhost
  when: filebeat_secret is failed
  run_once: true
  no_log: true

- name: Set Filebeat API key fact (from vault)
  ansible.builtin.set_fact:
    filebeat_api_key: "{{ filebeat_secret.data.data.api_key }}"
  when: filebeat_secret is not failed
  no_log: true

- name: Set Filebeat API key fact (newly created)
  ansible.builtin.set_fact:
    filebeat_api_key: "{{ filebeat_api_key_result.json.id }}:{{ filebeat_api_key_result.json.api_key }}"
  when: filebeat_secret is failed
  no_log: true