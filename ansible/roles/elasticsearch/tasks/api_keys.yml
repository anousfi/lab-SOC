- name: Get elastic secret from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: elastic
  register: elastic_secret
  no_log: true

- name: Get Filebeat API key from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: filebeat_api_key
  register: filebeat_secret
  ignore_errors: true
  no_log: true

- name: Create Filebeat API key
  ansible.builtin.uri:
    url: "https://{{ elasticsearch_host }}:9200/_security/api_key"
    method: POST
    user: elastic
    password: "{{ elastic_secret.data.data.elastic_password }}"
    body_format: json
    body:
      name: filebeat-key
      role_descriptors:
        filebeat_role:
          cluster:
            - monitor
            - manage_ilm
            - manage_own_api_key
          index:
            - names: 
                - "filebeat-*"
              privileges:
                - write
                - create_index
                - create_doc
                - manage
    validate_certs: true
    ca_path: /etc/elasticsearch/certs/ca.crt
  register: filebeat_api_key_result
  when: filebeat_secret is failed
  no_log: true

- name: Store Filebeat API key in Vault
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: filebeat_api_key
    data:
      api_key: "{{ filebeat_api_key_result.json.id }}:{{ filebeat_api_key_result.json.api_key }}"
  when: filebeat_secret is failed
  no_log: true

- name: Set Filebeat API key fact
  ansible.builtin.set_fact:
    filebeat_api_key: >-
      {{
        filebeat_secret.data.data.api_key
        if filebeat_secret is not failed
        else filebeat_api_key_result.json.id ~ ':' ~ filebeat_api_key_result.json.api_key
      }}
  no_log: true