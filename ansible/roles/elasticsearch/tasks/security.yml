- name: Get elastic secret from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: elastic
  register: elastic_secret
  delegate_to: localhost
  no_log: true

- name: Attendre qu'Elasticsearch soit prêt
  ansible.builtin.command:
    cmd: >
      curl -sk -o /dev/null -w "%{http_code}"
      --cacert /etc/elasticsearch/certs/ca.crt
      https://127.0.0.1:9200
  register: es_up
  until: es_up.stdout in ['200', '401']
  retries: 10
  delay: 10
  changed_when: false

- name: Vérifier si Elastic est déjà configuré avec le mot de passe Vault
  ansible.builtin.uri:
    url: "https://{{ elasticsearch_host }}:9200/_cluster/health"
    method: GET
    user: elastic
    password: "{{ elastic_secret.data.data.elastic_password }}"
    validate_certs: true
    ca_path: /etc/elasticsearch/certs/ca.crt
    status_code: [200, 401]
  register: auth_check
  no_log: true

- name: Bootstrap — reset password temporaire
  ansible.builtin.command:
    cmd: >
      /usr/share/elasticsearch/bin/elasticsearch-reset-password
      -u elastic --batch --url https://{{ elasticsearch_host }}:9200
  register: reset_result
  changed_when: reset_result.rc == 0
  no_log: true
  when: auth_check.status == 401

- name: Bootstrap — extraire le mot de passe temporaire
  ansible.builtin.set_fact:
    bootstrap_password: "{{ reset_result.stdout | regex_search('New value: (.+)', '\\1') | first }}"
  no_log: true
  when: auth_check.status == 401

- name: Bootstrap — assert mot de passe extrait
  ansible.builtin.assert:
    that: bootstrap_password | length > 0
    fail_msg: "Impossible d'extraire le mot de passe bootstrap"
  when: auth_check.status == 401

- name: Bootstrap — appliquer le mot de passe Vault
  ansible.builtin.uri:
    url: "https://{{ elasticsearch_host }}:9200/_security/user/elastic/_password"
    method: POST
    user: elastic
    password: "{{ bootstrap_password }}"
    body_format: json
    body:
      password: "{{ elastic_secret.data.data.elastic_password }}"
    validate_certs: true
    ca_path: /etc/elasticsearch/certs/ca.crt
    status_code: 200
  no_log: true
  when: auth_check.status == 401

- name: Vérifier l'auth finale avec le mot de passe Vault
  ansible.builtin.uri:
    url: "https://{{ elasticsearch_host }}:9200/_cluster/health"
    method: GET
    user: elastic
    password: "{{ elastic_secret.data.data.elastic_password }}"
    validate_certs: true
    ca_path: /etc/elasticsearch/certs/ca.crt
    status_code: 200
  no_log: true