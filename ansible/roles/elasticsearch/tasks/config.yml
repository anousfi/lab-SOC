- name: Create cert dir
  ansible.builtin.file:
    path: /etc/elasticsearch/certs
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: "0700"

- name: Copy cert
  ansible.builtin.copy:
    src: "/tmp/certs/elasticsearch/elasticsearch.crt"
    dest: /etc/elasticsearch/certs/elasticsearch.crt
    owner: elasticsearch
    group: elasticsearch
    mode: "0644"
  notify: restart elasticsearch
  

- name: Copy key
  ansible.builtin.copy:
    src: "/tmp/certs/elasticsearch/elasticsearch.key"
    dest: /etc/elasticsearch/certs/elasticsearch.key
    owner: elasticsearch
    group: elasticsearch
    mode: "0600"
  notify: restart elasticsearch

- name: Copy CA
  ansible.builtin.copy:
    src: "/tmp/pki/ca.crt"
    dest: /etc/elasticsearch/certs/ca.crt
    owner: elasticsearch
    group: elasticsearch
    mode: "0644"
  notify: restart elasticsearch

- name: Configure Elasticsearch
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
  notify: restart elasticsearch

- name: Enable Elasticsearch
  ansible.builtin.systemd:
    name: elasticsearch
    enabled: true