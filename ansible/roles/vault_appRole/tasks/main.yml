- name: Activer AppRole auth
  community.hashi_vault.vault_auth_method:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    method_type: approle
    state: enabled

- name: Créer policy ELK
  community.hashi_vault.vault_policy:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    name: "{{ vault_policy_name }}"
    rules: |
      path "pki/ca" {
        capabilities = ["read", "list"]
      }

      path "pki/issue/*" {
        capabilities = ["create", "update"]
      }
      path "secret/data/*" {
        capabilities = ["create", "read", "update", "delete", "list"]
      }
      path "secret/metadata/*" {
        capabilities = ["list"]
      }
      
- name: Créer AppRole Ansible
  community.hashi_vault.vault_write:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    path: "auth/approle/role/{{ vault_approle_name }}"
    data:
      token_policies: "{{ vault_policy_name }}"
      token_ttl: "{{ vault_token_ttl }}"
      token_max_ttl: "{{ vault_token_max_ttl }}"
    changed: false
    
- name: Lire role_id
  community.hashi_vault.vault_read:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    path: "auth/approle/role/{{ vault_approle_name }}/role-id"
  register: approle_role_id

- name: Générer secret_id
  community.hashi_vault.vault_approle_role_secret_id:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    path: "auth/approle/role/{{ vault_approle_name }}/secret-id"
  register: approle_secret_id
  no_log: true

- name: approle authentication  
  community.hashi_vault.vault_login:
    url: "{{ vault_url }}"
    auth_method: approle
    role_id: "{{ approle_role_id.data.data.role_id }}"
    secret_id: "{{ approle_secret_id.data.secret_id }}"
  register: login

- name: set approle token
  ansible.builtin.set_fact:
    vault_token: "{{ login.auth.client_token }}"
  no_log: true

