- name: Create cert directories
  ansible.builtin.file:
    path: "/tmp/certs/{{ item.name }}"
    state: directory
    mode: "0700"
  loop: "{{ services }}"

- name: Create CA directory
  ansible.builtin.file:
    path: /tmp/pki
    state: directory
    mode: "0755"

- name: Get CA from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: pki/ca
  register: ca_data
  no_log: true

# Vérifications
- name: Vérifier si les certificats existent déjà
  ansible.builtin.stat:
    path: "/tmp/certs/{{ item.name }}/{{ item.name }}.crt"
  loop: "{{ services }}"
  register: cert_files

- name: Vérifier expiration des certificats existants
  ansible.builtin.shell: |
    openssl x509 -checkend 604800 -noout \
      -in /tmp/certs/{{ item.name }}/{{ item.name }}.crt
  loop: "{{ services }}"
  loop_control:
    index_var: idx
  when: cert_files.results[idx].stat.exists   # ← seulement si le fichier existe
  register: cert_expiry
  failed_when: false
  changed_when: false

# Génération unique avec les deux conditions combinées
- name: Générer cert si absent ou expirant sous 7 jours
  community.hashi_vault.vault_pki_generate_certificate:
    url: "{{ vault_url }}"
    token: "{{ vault_token }}"
    engine_mount_point: "{{ pki_path }}"
    role_name: "{{ pki_role_name }}"
    common_name: "{{ item.cn }}"
    alt_names: "{{ item.dns | default([item.cn]) | join(',') }}"
    ip_sans: >-
      {{
        groups[item.host] | default([])
          | map('extract', hostvars, 'ansible_host')
          | select('defined')
          | list
          | join(',')
      }}
    ttl: "{{ cert_ttl }}"
  loop: "{{ services }}"
  loop_control:
    index_var: idx
  when: >
    not cert_files.results[idx].stat.exists or
    (cert_expiry.results[idx].rc | default(0)) != 0
  register: cert_results
  no_log: true

# Sauvegarde uniquement des certs fraîchement générés
- name: Save certificates
  ansible.builtin.copy:
    dest: "/tmp/certs/{{ item.item.name }}/{{ item.item.name }}.crt"
    content: "{{ item.data.data.certificate }}"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ cert_results.results }}"
  when: not item.skipped | default(false)   # ← ignore les items skippés
  no_log: true

- name: Save private keys
  ansible.builtin.copy:
    dest: "/tmp/certs/{{ item.item.name }}/{{ item.item.name }}.key"
    content: "{{ item.data.data.private_key }}"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ cert_results.results }}"
  when: not item.skipped | default(false)   # ← ignore les items skippés
  no_log: true

- name: Save CA
  ansible.builtin.copy:
    dest: /tmp/pki/ca.crt
    content: "{{ ca_data.data.data.certificate }}"
    mode: "0644"
  no_log: true